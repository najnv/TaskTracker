<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
    <h1>Task Tracker</h1>
    <form id="task-form">
        <input id="task-title" type="text" placeholder="Введите задачу">
        <input id="task-tags" type="text" placeholder="Теги через запятую">
        <button type="submit">Добавить</button>
    </form>
    <ul id="taskList"></ul>
</main>
<script src="app.js"> </script>
</body>
</html>
